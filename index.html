<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f9fafb">
<link rel="icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de EPIs</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs" defer></script>

<!-- LIB EXCEL -->
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-gray-50 text-gray-800">

<div x-data="app()" x-init="init()" class="max-w-5xl mx-auto p-4 space-y-5">

<!-- HEADER -->
<div class="flex justify-between items-center relative">
  <h1 class="text-xl font-semibold">Controle de EPIs</h1>

  <div class="flex gap-2 relative">

    <button @click="add()" class="btn">+ Novo</button>
    <button @click="exportExcel()" class="btn">Exportar</button>

    <!-- NOTIF -->
    <div class="relative">
      <button @click="showNotif = !showNotif" class="btn relative">
        🔔
        <span x-show="alertas.length"
          class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 rounded-full"
          x-text="alertas.length"></span>
      </button>

      <!-- MENU -->
      <div x-show="showNotif"
           @click.outside="showNotif = false"
           x-transition
           class="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-lg p-3 space-y-2 z-50">

        <template x-if="alertas.length === 0">
          <p class="text-sm text-gray-500">Nenhum alerta</p>
        </template>

        <template x-for="a in alertas" :key="a.id">
          <div :class="a.cor" class="p-2 rounded text-xs space-y-1">
            <div class="font-semibold" x-text="a.titulo"></div>
            <div><b>Item:</b> <span x-text="a.nome"></span></div>
            <div><b>Qtd:</b> <span x-text="a.saldo"></span></div>
            <div><b>Mín:</b> <span x-text="a.min"></span></div>
            <div><b>Val:</b> <span x-text="a.validade || '-'"></span></div>
          </div>
        </template>

      </div>
    </div>

  </div>
</div>

<!-- MOBILE -->
<div class="space-y-4 md:hidden">
  <template x-for="item in itens" :key="item.id">
    <div class="bg-white p-4 rounded-xl shadow-sm space-y-2 text-sm">
      <div><b>Item:</b><input x-model="item.nome" class="input"></div>
      <div><b>CA:</b><input x-model="item.ca" class="input"></div>
      <div><b>Validade:</b><input type="date" x-model="item.validade_ca" class="input"></div>
      <div><b>Quantidade:</b><input type="number" x-model="item.saldo_atual" class="input"></div>
      <div><b>Mínimo:</b><input type="number" x-model="item.estoque_minimo" class="input"></div>
      <button @click="remover(item.id)" class="btn-danger w-full">Remover</button>
    </div>
  </template>
</div>

<!-- DESKTOP -->
<div class="hidden md:block bg-white rounded-xl shadow-sm">
<table class="w-full">
<thead class="bg-gray-100">
<tr>
<th class="p-3 text-left">Nome</th>
<th>CA</th>
<th>Validade</th>
<th>Saldo</th>
<th>Mín</th>
<th></th>
</tr>
</thead>

<tbody>
<template x-for="item in itens" :key="item.id">
<tr class="border-t">
<td class="p-2"><input x-model="item.nome" class="input"></td>
<td><input x-model="item.ca" class="input"></td>
<td><input type="date" x-model="item.validade_ca" class="input"></td>
<td><input type="number" x-model="item.saldo_atual" class="input"></td>
<td><input type="number" x-model="item.estoque_minimo" class="input"></td>
<td><button @click="remover(item.id)" class="text-red-500">🗑</button></td>
</tr>
</template>
</tbody>
</table>
</div>

</div>

<style>
.btn{ @apply px-4 py-2 bg-white border rounded-xl shadow-sm hover:bg-gray-100; }
.btn-danger{ @apply px-4 py-2 bg-red-500 text-white rounded-xl hover:bg-red-600; }
.input{ @apply w-full border rounded-lg px-2 py-2 mt-1; }
.alert-red{ @apply bg-red-100 text-red-700; }
.alert-yellow{ @apply bg-yellow-100 text-yellow-700; }
.alert-orange{ @apply bg-orange-100 text-orange-700; }
</style>

<script>
function app(){
return {

itens: [],
alertas: [],
showNotif: false,

init(){
  const data = localStorage.getItem('epis');
  this.itens = data ? JSON.parse(data) : [];

  this.analisar();

  this.$watch('itens', () => {
    localStorage.setItem('epis', JSON.stringify(this.itens));
    this.analisar();
  }, { deep: true });
},

add(){
  this.itens.push({
    id: Date.now(),
    nome:'', ca:'', validade_ca:'',
    saldo_atual:0, estoque_minimo:0
  });
},

remover(id){
  this.itens = this.itens.filter(i => i.id !== id);
},

exportExcel(){
  const dados = this.itens.map(i => ({
    Nome: i.nome,
    CA: i.ca,
    Validade: i.validade_ca,
    Saldo: i.saldo_atual,
    Minimo: i.estoque_minimo
  }));

  const ws = XLSX.utils.json_to_sheet(dados);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "EPIs");

  XLSX.writeFile(wb, "controle_epis.xlsx");
},

analisar(){
  this.alertas = [];
  const hoje = new Date();

  this.itens.forEach(i => {

    if(i.saldo_atual < i.estoque_minimo){
      this.alertas.push({
        id: Math.random(),
        titulo:'🔴 Crítico',
        nome:i.nome,
        saldo:i.saldo_atual,
        min:i.estoque_minimo,
        validade:i.validade_ca,
        cor:'alert-red'
      });
    }

    else if(i.saldo_atual <= i.estoque_minimo * 1.5){
      this.alertas.push({
        id: Math.random(),
        titulo:'🟡 Baixo',
        nome:i.nome,
        saldo:i.saldo_atual,
        min:i.estoque_minimo,
        validade:i.validade_ca,
        cor:'alert-yellow'
      });
    }

    if(i.validade_ca){
      const dias = (new Date(i.validade_ca) - hoje)/(1000*60*60*24);
      if(dias < 60){
        this.alertas.push({
          id: Math.random(),
          titulo:'🟠 Vencendo',
          nome:i.nome,
          saldo:i.saldo_atual,
          min:i.estoque_minimo,
          validade:i.validade_ca,
          cor:'alert-orange'
        });
      }
    }

  });
}

}
}
</script>

</body>
</html>
